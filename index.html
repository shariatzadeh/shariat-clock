<!DOCTYPE html>
<html>
<head>
  <title>ساعت</title>
<meta name=  "eastern-clock"    content="#aa7700">
  <meta name="theme-color"        content="black">
  <link rel="manifest"        href="manifest.json">
</head>
  
<body dir=rtl
style="background-color:#888"
>
<p align=center>

<canvas  id="canvas" width="400" height="400"></canvas>
</p>
<p align=center>
Western Clock
<br/>
<canvas  id="canvas2" width="300" height="300" style='background-color: darkgray;'></canvas>
</p>

<script>


setInterval(drawClocks, 1000);


function drawClocks() {
var islamicClock = true;
var canvas1 = document.getElementById("canvas");
drawClock(canvas1, islamicClock)

var islamicClock = false;

var canvas2 = document.getElementById("canvas2");
drawClock(canvas2, islamicClock)
}

function drawClock(_canvas, islamicClock) {
var ctx = _canvas.getContext("2d");
var radius = _canvas.height / 2;
ctx.translate(radius, radius);
radius2 = radius * 0.90;
  drawFace(ctx, radius2, islamicClock);
  drawNumbers(ctx, radius2, islamicClock);
  drawTime(ctx, radius2, islamicClock);
ctx.translate(-radius, -radius);
}

function drawFace(ctx, radius, islamicClock) {
  var grad;
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, 2*Math.PI);
  ctx.fillStyle = 'white';
  ctx.fill();
  grad = ctx.createRadialGradient(0,0,radius*0.95, 0,0,radius*1.05);
  grad.addColorStop(0, '#333');
  grad.addColorStop(0.5, 'white');
  grad.addColorStop(1, '#333');
  ctx.strokeStyle = grad;
  ctx.lineWidth = radius*0.1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, radius*0.1, 0, 2*Math.PI);
  ctx.fillStyle = '#333';
  ctx.fill();
}

function drawNumbers(ctx, radius, islamicClock) {
  var ang;
  var num;
  var fontface = '';
  if (islamicClock) fontface = " 'B mitra'";
  ctx.font = radius*0.2 + "px" + fontface;
  ctx.textBaseline="middle";
  ctx.textAlign="center";
  for(num = 1; num < 13; num++){
    
	if (islamicClock) { 
		ang = -num * Math.PI / 6;
	}
	else {
		ang = num * Math.PI / 6;
	}
	
	if (islamicClock) { ang += Math.PI / 12;}
    ctx.rotate(ang);
    ctx.translate(0, -radius*0.85);
    ctx.rotate(-ang);
    ctx.fillText(num.toString(), 0, 0);
    ctx.rotate(ang);
    ctx.translate(0, radius*0.85);
    ctx.rotate(-ang);

	if (islamicClock) { 
		ang = -num * Math.PI / 6;
	}
	else {
		ang = num * Math.PI / 6;
	}
    ctx.lineWidth = 3;
    ctx.rotate(-ang);
    ctx.moveTo(0,-radius*0.92);
    ctx.lineTo(0, -radius*0.95);
    ctx.stroke();
    ctx.rotate(ang);

  }
}

function drawTime(ctx, radius, islamicClock){
//https://www.erfan.ir/mafatih392/%D8%AF%D8%B9%D8%A7%D9%87%D8%A7%DB%8C-%D9%87%D8%B1-%D8%B3%D8%A7%D8%B9%D8%AA%DB%8C-%D8%AF%D8%B1-%D8%B7%D9%88%D9%84-%D8%B1%D9%88%D8%B2-%DA%A9%D9%84%DB%8C%D8%A7%D8%AA-%D9%85%D9%81%D8%A7%D8%AA%DB%8C%D8%AD-%D8%A7%D9%84%D8%AC%D9%86%D8%A7%D9%86-%D8%A8%D8%A7-%D8%AA%D8%B1%D8%AC%D9%85%D9%87-%D8%A7%D8%B3%D8%AA%D8%A7%D8%AF-%D8%AD%D8%B3%DB%8C%D9%86-%D8%A7%D9%86%D8%B5%D8%A7%D8%B1%DB%8C%D8%A7%D9%86
    var now = new Date();
	if (islamicClock) {
		now = new Date(now.getTime() + 6*60*60000)
	}
	var direction = -1;
	if (islamicClock) {
		direction = 1;
	}
    var hour = now.getHours();
    var minute = now.getMinutes();
    var second = now.getSeconds();
	
    //hour
    hour=hour%12;
    hour=(hour*Math.PI/6)+    (minute*Math.PI/(6*60))+    (second*Math.PI/(360*60));
    drawHand(ctx, direction*hour, radius*0.5, radius*0.07, 'black');
    //minute
    minute=(minute*Math.PI/30)+(second*Math.PI/(30*60));
    drawHand(ctx, direction*minute, radius*0.8, radius*0.05, 'black');
    // second
    second=(second*Math.PI/30);
    drawHand(ctx, direction*second, radius*0.8, radius*0.02, 'red');
}

function drawHand(ctx, pos, length, width, color) {
	ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.moveTo(0,0);
    ctx.rotate(-pos);
    ctx.lineTo(0, -length);
    ctx.stroke();
    ctx.rotate(pos);
}
</script>

</body>
</html>
